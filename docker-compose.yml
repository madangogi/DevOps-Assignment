version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devops-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    environment:
      - PORT=8000
    networks:
      - devops-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devops-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_BACKEND_URL=http://backend:8000
    networks:
      - devops-network
    restart: unless-stopped

volumes:
  backend-data:

networks:
  devops-network:
    driver: bridge